# ╔══════════════════════════════════════════════════════════════╗
# ║  AutoDeploy SI ITK — GitHub Actions Workflow                 ║
# ╠══════════════════════════════════════════════════════════════╣

name: 🚀 AutoDeploy v2

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main
      
    paths-ignore:
      - '**.md'
      - '.github/**'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
      - 'README*'

  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode deploy'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - update

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────────────
  #  JOB 1: DETECT & VALIDATE
  # ──────────────────────────────────────────────────────
  detect:
    name: 🔍 Detect & Validate
    runs-on: ubuntu-latest
    outputs:
      app_type:    ${{ steps.detect.outputs.app_type }}
      repo_slug:   ${{ steps.slug.outputs.repo_slug }}
      deploy_mode: ${{ steps.mode.outputs.deploy_mode }}
      has_npm:     ${{ steps.detect.outputs.has_npm }}

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🏷️ Generate repo slug
        id: slug
        run: |
          SLUG=$(echo "${{ github.event.repository.name }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9-]/-/g' \
            | sed 's/--*/-/g' \
            | sed 's/^-//;s/-$//')
          echo "repo_slug=$SLUG" >> "$GITHUB_OUTPUT"

      - name: 🔎 Detect framework
        id: detect
        run: |
          if [[ -f "artisan" && -f "composer.json" ]]; then
            echo "app_type=laravel" >> "$GITHUB_OUTPUT"
          elif [[ -f "composer.json" ]]; then
            echo "app_type=php-composer" >> "$GITHUB_OUTPUT"
          else
            echo "app_type=php-native" >> "$GITHUB_OUTPUT"
          fi

          if [[ -f "package.json" ]]; then
            echo "has_npm=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_npm=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 📋 Set deploy mode
        id: mode
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "deploy_mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_mode=full" >> "$GITHUB_OUTPUT"
          fi

      - name: 🧪 PHP syntax lint
        run: |
          find . -name "*.php" ! -path "./vendor/*" -exec php -l {} \; | grep "Errors parsing" && exit 1 || echo "✅ Syntax OK"

  # ──────────────────────────────────────────────────────
  #  JOB 2: PACKAGE & DEPLOY
  # ──────────────────────────────────────────────────────
  deploy:
    name: 🚀 Package & Deploy
    runs-on: ubuntu-latest
    needs: detect
    env:
      REPO_SLUG:   ${{ needs.detect.outputs.repo_slug }}
      APP_TYPE:    ${{ needs.detect.outputs.app_type }}
      HAS_NPM:     ${{ needs.detect.outputs.has_npm }}
      DEPLOY_MODE: ${{ needs.detect.outputs.deploy_mode }}
      DEPLOY_URL:  https://deployv2.akhzafachrozy.my.id

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 📦 Create deployment ZIP (with dotfiles)
        run: |
          find . \
            -not -path "./.git/*" \
            -not -path "./.github/*" \
            -not -path "./node_modules/*" \
            -not -path "./vendor/*" \
            -not -name ".env" \
            -not -name "deploy.zip" \
            -not -name "*.log" \
            | zip deploy.zip -@ -q

          echo "--- Verifikasi dotfiles dalam ZIP ---"
          unzip -l deploy.zip | grep -E '\.env\.example|\.htaccess|\.gitignore' || echo "(dotfile spesifik tidak ditemukan)"

          echo "zip_size=$(du -sh deploy.zip | cut -f1)" >> "$GITHUB_ENV"
          echo "✅ ZIP berhasil dibuat: $(du -sh deploy.zip | cut -f1)"

      - name: 🌐 Send to deploy endpoint
        id: request
        run: |
          RESPONSE=$(curl -s -X POST \
            -H "User-Agent: GitHub-Actions-AutoDeploy-v2" \
            -F "key=autodeploy-classroom" \
            -F "repo=$REPO_SLUG" \
            -F "mode=$DEPLOY_MODE" \
            -F "file=@deploy.zip" \
            "$DEPLOY_URL")

          echo "RAW_RESPONSE<<EOF" >> "$GITHUB_ENV"
          echo "$RESPONSE" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

          if echo "$RESPONSE" | grep -q "AUTODEPLOY_START"; then
             echo "status=success" >> "$GITHUB_ENV"
          else
             echo "status=failed" >> "$GITHUB_ENV"
             echo "::error::Server returned error: $RESPONSE"
             exit 1
          fi

      - name: 📊 Parse ADPL Results
        if: always()
        run: |
          echo "P_DOMAIN=$(echo "${{ env.RAW_RESPONSE }}" | grep '^ADPL:domain=' | cut -d'=' -f2-)" >> "$GITHUB_ENV"
          echo "P_PORT=$(echo "${{ env.RAW_RESPONSE }}" | grep '^ADPL:port=' | cut -d'=' -f2-)" >> "$GITHUB_ENV"
          echo "P_SSH_USER=$(echo "${{ env.RAW_RESPONSE }}" | grep '^ADPL:ssh_user=' | cut -d'=' -f2-)" >> "$GITHUB_ENV"
          echo "P_SSH_PASS=$(echo "${{ env.RAW_RESPONSE }}" | grep '^ADPL:ssh_pass=' | cut -d'=' -f2-)" >> "$GITHUB_ENV"
          echo "P_SSH_CMD=$(echo "${{ env.RAW_RESPONSE }}" | grep '^ADPL:ssh_cmd=' | cut -d'=' -f2-)" >> "$GITHUB_ENV"
          echo "P_SERVICE=$(echo "${{ env.RAW_RESPONSE }}" | grep '^ADPL:service=' | cut -d'=' -f2-)" >> "$GITHUB_ENV"
          echo "P_WEB_STATUS=$(echo "${{ env.RAW_RESPONSE }}" | grep '^ADPL:web_status=' | cut -d'=' -f2-)" >> "$GITHUB_ENV"
          echo "P_FILE_OWNER=$(echo "${{ env.RAW_RESPONSE }}" | grep '^ADPL:file_owner=' | cut -d'=' -f2-)" >> "$GITHUB_ENV"

      - name: 📝 Job Summary
        if: always()
        run: |
          if [[ "${{ env.status }}" == "success" ]]; then
            ICON="✅"; STATUS_LABEL="Berhasil"
          else
            ICON="❌"; STATUS_LABEL="Gagal"
          fi

          # Tentukan PHP binary path
          PHP_BIN="/www/server/php/83/bin/php"
          COMPOSER_BIN="/usr/local/bin/composer"

          cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY_EOF
          # ${ICON} AutoDeploy v2.3 — \`$REPO_SLUG\`

          > Deploy ${STATUS_LABEL} pada \`$(date '+%Y-%m-%d %H:%M:%S') UTC\`

          ---

          ## 🌐 Informasi Deployment

          | Info | Detail |
          | :--- | :--- |
          | **Domain** | [${{ env.P_DOMAIN }}](${{ env.P_DOMAIN }}) |
          | **App Type** | \`$APP_TYPE\` |
          | **Web Status** | ${{ env.P_WEB_STATUS }} |
          | **Port** | \`${{ env.P_PORT }}\` |
          | **SSH User** | \`${{ env.P_SSH_USER }}\` |
          | **SSH Pass** | \`${{ env.P_SSH_PASS }}\` |
          | **Service** | \`${{ env.P_SERVICE }}\` |
          | **ZIP Size** | \`${{ env.zip_size }}\` |

          ---

          ## 💻 Langkah 1 — Install cloudflared (sekali saja)

          > SSH ke server menggunakan Cloudflare Tunnel. Kamu perlu install \`cloudflared\` terlebih dahulu.

          ### 🪟 Windows
          1. Download file \`cloudflaredclient.bat\` dari folder yang dibagikan dosen
          2. **Klik kanan** → **Run as administrator**
          3. Tunggu hingga muncul **"BERHASIL!"**

          > Jika muncul *"Windows protected your PC"*, klik **More info** → **Run anyway**

          ### 🍎 macOS
          ```bash
          brew install cloudflare/cloudflare/cloudflared
          ```
          > Belum punya Homebrew? Install dulu: https://brew.sh

          ### 🐧 Linux
          ```bash
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared && sudo mv cloudflared /usr/local/bin/
          ```

          ---

          ## 🔑 Langkah 2 — Login SSH ke Server

          ### 🪟 Windows
          1. Download file \`ssh.bat\` dari folder yang dibagikan dosen
          2. **Klik kanan** → **Run as administrator**
          3. Masukkan username & password di bawah saat diminta

          ### 🍎 macOS / 🐧 Linux
          ```bash
          ${{ env.P_SSH_CMD }}
          ```
          > Password: \`${{ env.P_SSH_PASS }}\`

          Jika diminta *"Are you sure you want to continue connecting?"* — ketik \`yes\` lalu Enter.

          ---

          ## 📂 Langkah 3 — Masuk ke Direktori Project

          Setelah berhasil SSH, kamu langsung berada di home directory. Pindah ke folder project:

          ```bash
          cd /www/wwwroot/hosting/$REPO_SLUG
          ls -la
          ```

          > Semua file kode kamu sudah ada di sini. Dari direktori ini semua perintah selanjutnya dijalankan.

          ---
          $( if [[ "$APP_TYPE" == "laravel" ]]; then
          cat << LARAVEL_EOF

          ## ⚙️ Langkah 4 — Setup Laravel

          ### 4a. Install dependencies Composer
          \`\`\`bash
          ${PHP_BIN} ${COMPOSER_BIN} install --no-dev --optimize-autoloader
          \`\`\`

          $( if [[ "$HAS_NPM" == "true" ]]; then
          echo '### 4b. Install dependencies NPM & build assets'
          echo '```bash'
          echo 'npm install'
          echo 'npm run build'
          echo '```'
          fi )

          ### 4c. Salin & edit file .env
          \`\`\`bash
          cp .env.example .env
          nano .env
          \`\`\`

          Isi konfigurasi berikut di file \`.env\`:
          \`\`\`env
          APP_KEY=               # akan diisi otomatis langkah 4d
          APP_URL=https://$REPO_SLUG.akhzafachrozy.my.id
          APP_ENV=production
          APP_DEBUG=false

          DB_CONNECTION=mysql
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=deploysiitk
          DB_USERNAME=deploysiitk
          DB_PASSWORD=deploysiitk2026
          \`\`\`

          > Simpan file: tekan **Ctrl+X** → **Y** → **Enter**

          ### 4d. Generate APP_KEY
          \`\`\`bash
          ${PHP_BIN} artisan key:generate
          \`\`\`

          ### 4e. Jalankan migrasi database
          \`\`\`bash
          ${PHP_BIN} artisan migrate --force
          \`\`\`

          ### 4f. Buat symlink storage
          \`\`\`bash
          ${PHP_BIN} artisan storage:link
          \`\`\`

          ### 4g. Fix permission & restart service
          \`\`\`bash
          sudo fix-perm-$REPO_SLUG
          sudo systemctl restart ${{ env.P_SERVICE }}
          \`\`\`

          ### 4h. Verifikasi service berjalan
          \`\`\`bash
          sudo systemctl status ${{ env.P_SERVICE }}
          \`\`\`

          LARAVEL_EOF
          elif [[ "$APP_TYPE" == "php-composer" ]]; then
          cat << COMPOSER_EOF

          ## ⚙️ Langkah 4 — Install Dependencies

          \`\`\`bash
          ${PHP_BIN} ${COMPOSER_BIN} install --no-dev --optimize-autoloader
          \`\`\`

          $( if [[ "$HAS_NPM" == "true" ]]; then
          echo '```bash'
          echo 'npm install && npm run build'
          echo '```'
          fi )

          Lalu fix permission & restart:
          \`\`\`bash
          sudo fix-perm-$REPO_SLUG
          sudo systemctl restart ${{ env.P_SERVICE }}
          \`\`\`

          COMPOSER_EOF
          else
          cat << NATIVE_EOF

          ## ⚙️ Langkah 4 — Konfigurasi Aplikasi

          $( if [[ "$HAS_NPM" == "true" ]]; then
          echo '### Install & build aset'
          echo '```bash'
          echo 'npm install && npm run build'
          echo '```'
          fi )

          Fix permission & restart service:
          \`\`\`bash
          sudo fix-perm-$REPO_SLUG
          sudo systemctl restart ${{ env.P_SERVICE }}
          \`\`\`

          NATIVE_EOF
          fi )

          ---

          ## 🎉 Langkah 5 — Cek Web Kamu

          Buka di browser: [${{ env.P_DOMAIN }}](${{ env.P_DOMAIN }})

          ---

          ## 🔄 Update Kode Selanjutnya

          Cukup push ke GitHub — deploy berjalan otomatis:
          ```bash
          git add .
          git commit -m "update"
          git push origin main
          ```

          File yang **tidak ditimpa** saat update: \`.env\`, \`storage/\`, \`vendor/\`, \`database/database.sqlite\`

          Jika ada migrasi baru, jalankan via SSH:
          ```bash
          ${PHP_BIN} artisan migrate --force
          ```

          ---

          ## 🛠 Perintah Berguna

          ```bash
          # Lihat status service
          sudo systemctl status ${{ env.P_SERVICE }}

          # Restart service
          sudo systemctl restart ${{ env.P_SERVICE }}

          # Fix permission
          sudo fix-perm-$REPO_SLUG

          # Lihat log aplikasi (live)
          tail -f /var/log/autodeploy/$REPO_SLUG-app.log

          # Lihat log systemd (live)
          sudo journalctl -u ${{ env.P_SERVICE }} -f
          ```

          ---

          <details><summary>📄 Log Raw Server</summary>

          \`\`\`text
          ${{ env.RAW_RESPONSE }}
          \`\`\`

          </details>

          SUMMARY_EOF

  # ──────────────────────────────────────────────────────
  #  JOB 3: NOTIFY
  # ──────────────────────────────────────────────────────
  notify:
    name: 📣 Notification
    runs-on: ubuntu-latest
    needs: [detect, deploy]
    if: always()
    steps:
      - name: Print Final Status
        run: |
          echo "Deployment for ${{ needs.detect.outputs.repo_slug }} finished with status: ${{ needs.deploy.result }}"
